<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Capítulos Made In Abyss</title>

    <style>
        body {
            background-color: rgb(127, 140, 255);
            font-family: Arial;
            text-align: center;
        }

        /* Estilo para la portada en esta página */
        .portada-mini {
            width: 200px; /* Tamaño tipo miniatura */
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        video {
            margin: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-top: 30px;
        }

        h3 {
            color: #fff;
            background-color: rgba(0,0,0,0.2);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 5px;
        }

        .volver {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: white;
            background-color: #333;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .volver:hover {
            background-color: #575757;
        }
    </style>
</head>

<body>

<h1>Capítulos</h1>

<!-- Insertamos la portada aquí -->
<img src="p1.jfif" alt="Portada Made in Abyss" class="portada-mini">

<div class="lista-capitulos">
    
    <!-- Capítulo 1 -->
    <div class="video-item">
        <h3>Capítulo 1</h3>
        <!-- Usamos un iframe para que Drive gestione el reproductor -->
        <iframe src="https://drive.google.com/file/d/1OD_TyVHJd2eGO9PquZOnljpHLV3SC0xP/preview" width="600" height="340" allow="autoplay"></iframe>
    </div>

    <!-- Capítulo 2 -->
    <div class="video-item">
        <h3>Capítulo 2</h3>
        <iframe src="https://drive.google.com/file/d/1GpYpttJv-0lC19xv9MBazI5XaF8R4joT/preview" width="600" height="340" allow="autoplay"></iframe>
    </div>

</div>

</div>
